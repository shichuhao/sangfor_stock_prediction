name: Daily Predict

on:
  schedule:
    # UTC 08:35 = 北京时间 16:35(A股收盘后),仅工作日触发
    - cron: "35 8 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Predict next trading day
        run: python daily/predict_today.py

      - name: Backfill previous predictions with actual results
        run: python daily/evaluate.py

      - name: Regenerate accuracy report
        run: python reports/generate_report.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv outputs/*.csv reports/*.md
          git diff --cached --quiet || git commit -m "Daily predict/evaluate $(date -u +%Y-%m-%d)"
          git push
