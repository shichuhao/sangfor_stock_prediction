name: Monthly Backtest

on:
  schedule:
    # UTC 09:20 = 北京时间 17:20,每月1号触发,用最新全部历史重新跑一遍walk-forward回测
    - cron: "20 9 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh base data
        run: |
          python data/fetch_data.py
          python data/fetch_fundamentals.py
          python data/fetch_industry.py
          python data/fetch_index.py

      - name: Run full walk-forward backtest
        run: python backtest/run_backtest.py

      - name: Regenerate accuracy report
        run: python reports/generate_report.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv outputs/backtest_results.csv reports/*.md
          git diff --cached --quiet || git commit -m "Monthly backtest refresh $(date -u +%Y-%m-%d)"
          git push
